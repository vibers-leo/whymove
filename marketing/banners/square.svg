<svg width="250" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096f4d;stop-opacity:1" />
    </linearGradient>
    <clipPath id="rounded"><rect width="250" height="250" rx="12" ry="12"/></clipPath>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.4"/></filter>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="250" height="250" fill="url(#bg)" rx="12"/>
    <text x="125" y="62" font-family="Pretendard, -apple-system, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="2">VIBERS</text>
    <text x="125" y="105" font-family="Pretendard, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" filter="url(#shadow)">와이무브</text>
    <text x="125" y="137" font-family="Pretendard, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">암호화폐 실시간 대시보드</text>
    <rect x="55" y="162" width="140" height="36" rx="20" fill="rgba(255,255,255,0.2)"/>
    <text x="125" y="185" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">지금 확인하기 →</text>
    <text x="125" y="220" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">Powered by 계발자들</text>
  </g>
</svg>
