      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#096f4d;stop-opacity:1" />
    </linearGradient>
    <clipPath id="rounded"><rect width="728" height="90" rx="12" ry="12"/></clipPath>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.4"/></filter>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="728" height="90" fill="url(#bg)" rx="12"/>
    <text x="24" y="38" font-family="Pretendard, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white" filter="url(#shadow)">와이무브</text>
    <text x="24" y="60" font-family="Pretendard, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">암호화폐 실시간 대시보드</text>
    <rect x="570" y="25" width="140" height="40" rx="20" fill="rgba(255,255,255,0.2)"/>
    <text x="640" y="50" font-family="Pretendard, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">지금 확인하기 →</text>
    <text x="704" y="84" font-family="Pretendard, -apple-system, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="end">Powered by 계발자들</text>
  </g>
</svg>
